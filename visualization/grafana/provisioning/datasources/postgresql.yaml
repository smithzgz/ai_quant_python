apiVersion: 1

datasources:
  - name: QuantPostgreSQL
    type: grafana-postgresql-datasource
    access: proxy
    url: localhost:5432
    database: quant_db
    user: postgres
    secureJsonData:
      password: postgres
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1600